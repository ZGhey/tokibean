<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokibean · Settings</title>
  <style>
    :root {
      --bg: #f4f4f6; --card: #fff; --fg: #1c1c1e; --sub: #6b6b70; --line: #e3e3e6;
      --accent: #2e6b39; --field: #ececef; --field-b: #d7d7db;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e20; --card: #2a2a2d; --fg: #f2f2f4; --sub: #9a9aa0; --line: #38383c;
        --accent: #3a8f4c; --field: #333338; --field-b: #46464b;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      font-size: 13px; padding: 18px 20px; user-select: none;
    }
    h1 { font-size: 15px; margin: 0 0 14px; font-weight: 600; }
    .row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--line);
    }
    .row:last-of-type { border-bottom: none; }
    .row > label { color: var(--fg); }
    input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    input[type="number"], select, input[type="text"] {
      background: var(--field); color: var(--fg); border: 1px solid var(--field-b);
      border-radius: 6px; padding: 5px 8px; font: inherit; min-width: 96px;
    }
    input[type="text"].hotkey { text-align: center; cursor: pointer; min-width: 120px; }
    input[type="text"].hotkey.recording { border-color: var(--accent); color: var(--accent); }
    select { cursor: pointer; }
    .result { color: var(--sub); font-size: 11.5px; min-height: 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1 id="title">设置</h1>

  <div class="row">
    <label id="l-notify">系统通知</label>
    <input type="checkbox" id="cfg-notify" />
  </div>
  <div class="row">
    <label id="l-minsecs">不足此秒数不提醒</label>
    <input type="number" id="cfg-minsecs" min="0" max="3600" />
  </div>
  <div class="row">
    <label id="l-sound">提示音</label>
    <input type="checkbox" id="cfg-sound" />
  </div>
  <div class="row">
    <label id="l-hotkey">快捷键</label>
    <input type="text" id="cfg-bosskey" class="hotkey" readonly />
  </div>
  <div class="row">
    <label id="l-skin">皮肤</label>
    <select id="cfg-skin">
      <option value="classic">墩墩(默认)</option>
      <option value="bean">豆豆</option>
      <option value="tabby">橘猫·摸鱼</option>
    </select>
  </div>
  <div class="result" id="result"></div>

  <script>
    (function () {
      const { invoke } = window.__TAURI__.core;
      const { emit } = window.__TAURI__.event;
      const ZH = (navigator.language || "en").toLowerCase().startsWith("zh");
      const IS_MAC = navigator.userAgent.includes("Mac");
      const el = (id) => document.getElementById(id);
      const T = {
        title: ["设置", "Settings"],
        notify: ["系统通知", "Notifications"],
        minsecs: ["不足此秒数不提醒", "Skip notify under N sec"],
        sound: ["提示音", "Sound"],
        hotkey: ["快捷键", "Hotkey"],
        skin: ["皮肤", "Skin"],
        s_classic: ["墩墩(默认)", "Dundun (default)"],
        s_bean: ["豆豆", "Bean"],
        s_tabby: ["橘猫·摸鱼", "Tabby"],
        press: ["按下快捷键…", "Press a shortcut…"],
        hk_ok: ["快捷键已更新:{k}", "Hotkey updated: {k}"],
        hk_fail: ["快捷键设置失败:{e}", "Failed to set hotkey: {e}"],
      };
      const t = (k, v) => { let s = T[k] ? T[k][ZH ? 0 : 1] : k; if (v) for (const x in v) s = s.split("{" + x + "}").join(v[x]); return s; };
      // Static labels
      el("title").textContent = t("title");
      el("l-notify").textContent = t("notify");
      el("l-minsecs").textContent = t("minsecs");
      el("l-sound").textContent = t("sound");
      el("l-hotkey").textContent = t("hotkey");
      el("l-skin").textContent = t("skin");
      const opts = { classic: "s_classic", bean: "s_bean", tabby: "s_tabby" };
      for (const o of el("cfg-skin").options) o.textContent = t(opts[o.value] || o.value);

      let bossKeyAccel = "CommandOrControl+Shift+B";
      function prettyAccel(a) {
        const parts = a.split("+").map((p) => {
          const u = p.trim().toLowerCase();
          if (["commandorcontrol", "cmdorctrl"].includes(u)) return IS_MAC ? "⌘" : "Ctrl";
          if (["super", "meta", "cmd", "command"].includes(u)) return IS_MAC ? "⌘" : "Win";
          if (["control", "ctrl"].includes(u)) return IS_MAC ? "⌃" : "Ctrl";
          if (["alt", "option"].includes(u)) return IS_MAC ? "⌥" : "Alt";
          if (u === "shift") return IS_MAC ? "⇧" : "Shift";
          return p.trim().toUpperCase();
        });
        return IS_MAC ? parts.join("") : parts.join("+");
      }
      function accelFromEvent(e) {
        const mods = [];
        if (e.metaKey) mods.push("Super");
        if (e.ctrlKey) mods.push("Control");
        if (e.altKey) mods.push("Alt");
        if (e.shiftKey) mods.push("Shift");
        let key = null;
        if (/^Key[A-Z]$/.test(e.code)) key = e.code.slice(3);
        else if (/^Digit[0-9]$/.test(e.code)) key = e.code.slice(5);
        else if (/^F[0-9]{1,2}$/.test(e.code)) key = e.code;
        else if (e.code === "Space") key = "Space";
        if (!key || mods.length === 0) return null;
        return mods.concat(key).join("+");
      }

      // Persist notify/minsecs/sound/skin; tell the pet window so it can re-sync (sound) / reload (skin)
      function saveCfg(skinChanged) {
        return invoke("set_config", {
          notify: el("cfg-notify").checked,
          notifyMinSecs: Math.max(0, parseInt(el("cfg-minsecs").value, 10) || 0),
          sound: el("cfg-sound").checked,
          skin: el("cfg-skin").value,
        })
          .then(() => emit("config-changed", { skin: el("cfg-skin").value }))
          .catch((err) => (el("result").textContent = String(err)));
      }
      el("cfg-notify").addEventListener("change", () => saveCfg());
      el("cfg-minsecs").addEventListener("change", () => saveCfg());
      el("cfg-sound").addEventListener("change", () => saveCfg());
      el("cfg-skin").addEventListener("change", () => saveCfg(true));

      // Hotkey recorder
      const bossInput = el("cfg-bosskey");
      let recording = false;
      bossInput.addEventListener("focus", () => { recording = true; bossInput.classList.add("recording"); bossInput.value = t("press"); });
      bossInput.addEventListener("blur", () => { if (recording) { recording = false; bossInput.classList.remove("recording"); bossInput.value = prettyAccel(bossKeyAccel); } });
      bossInput.addEventListener("keydown", (e) => {
        if (!recording) return;
        e.preventDefault();
        if (e.key === "Escape") { bossInput.blur(); return; }
        const accel = accelFromEvent(e);
        if (!accel) return;
        invoke("set_boss_key", { accel })
          .then(() => { bossKeyAccel = accel; el("result").textContent = t("hk_ok", { k: prettyAccel(accel) }); emit("config-changed", {}); })
          .catch((err) => (el("result").textContent = t("hk_fail", { e: err })))
          .finally(() => { recording = false; bossInput.classList.remove("recording"); bossInput.value = prettyAccel(bossKeyAccel); bossInput.blur(); });
      });

      // Load current config
      invoke("get_config").then((c) => {
        el("cfg-notify").checked = c.notify;
        el("cfg-minsecs").value = c.notify_min_secs;
        el("cfg-sound").checked = c.sound;
        el("cfg-skin").value = c.skin || "classic";
        if (c.boss_key) { bossKeyAccel = c.boss_key; bossInput.value = prettyAccel(c.boss_key); }
      });
    })();
  </script>
</body>
</html>
