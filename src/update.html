<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokibean · Update</title>
  <style>
    :root {
      --bg: #f4f4f6; --card: #ffffff; --fg: #1c1c1e; --sub: #6b6b70;
      --line: #e3e3e6; --notes-bg: #f7f7f9; --accent: #2e6b39; --accent-h: #357a42;
      --btn: #e8e8ec; --btn-h: #dedee3;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e20; --card: #2a2a2d; --fg: #f2f2f4; --sub: #9a9aa0;
        --line: #3a3a3e; --notes-bg: #232326; --accent: #3a8f4c; --accent-h: #45a058;
        --btn: #3a3a3e; --btn-h: #46464b;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      font-size: 13px; display: flex; flex-direction: column;
      padding: 18px; gap: 14px; user-select: none;
    }
    .hidden { display: none !important; }
    .head { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 46px; height: 46px; border-radius: 11px; flex: 0 0 auto;
      background: #f2823e; display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    h1 { font-size: 16px; margin: 0 0 3px; font-weight: 600; }
    .sub { color: var(--sub); font-size: 12px; }
    .notes-label { color: var(--sub); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
    .notes {
      flex: 1 1 auto; min-height: 90px; overflow-y: auto;
      background: var(--notes-bg); border: 1px solid var(--line); border-radius: 8px;
      padding: 10px 12px; white-space: pre-wrap; line-height: 1.5; font-size: 12.5px;
    }
    .notes a { color: var(--accent); }
    .progress-wrap { display: flex; align-items: center; gap: 10px; }
    .bar { flex: 1; height: 8px; border-radius: 5px; background: var(--line); overflow: hidden; }
    .bar > i { display: block; height: 100%; width: 0%; background: var(--accent); transition: width 0.2s; }
    .pct { color: var(--sub); font-variant-numeric: tabular-nums; min-width: 38px; text-align: right; }
    .btns { display: flex; justify-content: flex-end; gap: 10px; }
    button {
      font: inherit; padding: 8px 18px; border-radius: 8px; border: none;
      background: var(--btn); color: var(--fg); cursor: pointer;
    }
    button:hover { background: var(--btn-h); }
    button.primary { background: var(--accent); color: #fff; }
    button.primary:hover { background: var(--accent-h); }
    button:disabled { opacity: 0.6; cursor: default; }
  </style>
</head>
<body>
  <!-- Update available -->
  <div id="view-update" class="hidden" style="display:flex;flex-direction:column;gap:14px;flex:1;min-height:0;">
    <div class="head">
      <div class="logo">🎁</div>
      <div>
        <h1 id="u-title">New version available</h1>
        <div class="sub" id="u-sub"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;flex:1;min-height:0;">
      <div class="notes-label" id="u-notes-label">What's new</div>
      <div class="notes" id="u-notes"></div>
    </div>
    <div class="progress-wrap hidden" id="u-progress">
      <div class="bar"><i id="u-bar-fill"></i></div>
      <span class="pct" id="u-pct">0%</span>
    </div>
    <div class="btns">
      <button id="btn-skip">Skip this version</button>
      <span style="flex:1"></span>
      <button id="btn-later">Later</button>
      <button id="btn-update" class="primary">Update Now</button>
    </div>
  </div>

  <!-- Up to date -->
  <div id="view-uptodate" class="hidden" style="flex-direction:column;gap:14px;flex:1;">
    <div class="head">
      <div class="logo">✅</div>
      <div>
        <h1 id="ok-title">You're up to date</h1>
        <div class="sub" id="ok-sub"></div>
      </div>
    </div>
    <div style="flex:1"></div>
    <div class="btns"><button id="btn-ok" class="primary">OK</button></div>
  </div>

  <script>
    (function () {
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;
      const win = window.__TAURI__.window.getCurrentWindow();
      // Language from the backend (system locale), injected as __PET_ZH__ before this script runs.
      // navigator.language is unreliable in WebView2 on Windows (it broke the zh/en split there),
      // so only fall back to it if the injection is somehow missing.
      const ZH = typeof window.__PET_ZH__ === "boolean"
        ? window.__PET_ZH__
        : (navigator.language || "en").toLowerCase().startsWith("zh");
      const T = {
        title_update: ["发现新版本", "New version available"],
        sub_update: ["码豆 {v} 已发布{cur}", "Tokibean {v} is available{cur}"],
        cur_have: ["(当前 {c})", " — you have {c}"],
        whatsnew: ["更新内容", "What's new"],
        no_notes: ["查看 GitHub Release 了解本次更新详情 →", "See the GitHub release for details →"],
        later: ["稍后", "Later"],
        skip: ["跳过此版本", "Skip this version"],
        update_now: ["立即更新", "Update Now"],
        downloading: ["下载中…", "Downloading…"],
        installing: ["安装中,即将重启…", "Installing, restarting…"],
        failed: ["更新失败,请稍后重试", "Update failed — please try again"],
        uptodate_title: ["已是最新版本", "You're up to date"],
        uptodate_sub: ["码豆 {c} 已是最新版本", "Tokibean {c} is the latest version"],
        ok: ["好", "OK"],
      };
      const t = (k, v) => { let s = (T[k] ? T[k][ZH ? 0 : 1] : k); if (v) for (const x in v) s = s.split("{" + x + "}").join(v[x]); return s; };
      const el = (id) => document.getElementById(id);
      const RELEASES = "https://github.com/ZGhey/tokibean/releases/latest";

      let current = "";
      let curVersion = "";
      async function getCurrent() {
        try { current = await window.__TAURI__.app.getVersion(); } catch (e) { current = ""; }
      }

      // Bilingual release notes convention: Chinese section, a divider line (———/---/===),
      // then the English section. Show only the half matching the system language.
      function pickLang(notes) {
        if (!notes || !notes.trim()) return "";
        const m = notes.match(/\n[ \t]*[—\-=─]{3,}[ \t]*\n/);
        if (m) {
          const zh = notes.slice(0, m.index).trim();
          const en = notes.slice(m.index + m[0].length).trim();
          return (ZH ? zh : en) || notes.trim();
        }
        return notes.trim();
      }
      function renderNotes(notes) {
        const picked = pickLang(notes);
        el("u-notes").textContent = picked || t("no_notes");
      }

      function showUpdate(u) {
        el("view-uptodate").classList.add("hidden");
        el("view-update").classList.remove("hidden");
        el("u-title").textContent = t("title_update");
        const cur = current ? t("cur_have", { c: current }) : "";
        el("u-sub").textContent = t("sub_update", { v: u.version, cur });
        el("u-notes-label").textContent = t("whatsnew");
        renderNotes(u.notes);
        curVersion = u.version;
        el("btn-skip").textContent = t("skip");
        el("btn-later").textContent = t("later");
        el("btn-update").textContent = t("update_now");
      }
      function showUpToDate() {
        el("view-update").classList.add("hidden");
        el("view-uptodate").classList.remove("hidden");
        el("ok-title").textContent = t("uptodate_title");
        el("ok-sub").textContent = t("uptodate_sub", { c: current || "" });
        el("btn-ok").textContent = t("ok");
      }

      function applyProgress(up) {
        const dl = up.status === "downloading";
        el("u-progress").classList.toggle("hidden", !dl);
        el("btn-update").disabled = dl;
        el("btn-later").disabled = dl;
        if (dl) {
          el("u-bar-fill").style.width = (up.progress || 0) + "%";
          el("u-pct").textContent = (up.progress || 0) + "%";
          el("btn-update").textContent = (up.progress || 0) > 0 ? t("installing") : t("downloading");
        }
        if (up.status === "error") {
          el("btn-update").disabled = false; el("btn-later").disabled = false;
          el("btn-update").textContent = t("update_now");
          el("u-sub").textContent = t("failed");
        }
      }

      function render(up) {
        if (up && up.available) { showUpdate(up.available); applyProgress(up); }
        else { showUpToDate(); }
      }

      el("btn-update").addEventListener("click", () => { invoke("install_update").catch(() => {}); });
      el("btn-later").addEventListener("click", () => win.close());
      el("btn-skip").addEventListener("click", () => {
        if (curVersion) invoke("skip_update", { version: curVersion }).catch(() => {});
        win.close();
      });
      el("btn-ok").addEventListener("click", () => win.close());

      listen("pet-update", (e) => { if (e.payload && e.payload.update) applyProgressOrRender(e.payload.update); });
      function applyProgressOrRender(up) {
        // Once shown, only refresh progress/error; don't flip views out from under the user
        if (!el("view-update").classList.contains("hidden")) applyProgress(up);
      }

      (async () => {
        await getCurrent();
        try { const u = await invoke("get_update"); render(u.update); }
        catch (e) { showUpToDate(); }
      })();
    })();
  </script>
</body>
</html>
