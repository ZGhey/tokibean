<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Pet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="panel" class="hidden">
    <!-- The panel is a GLANCE. It shows what you check every day and nothing else. Setup (connect,
         install hooks, billing mode) lives in the Settings window — those are one-time things nobody
         looks at twice, and while they lived here they crowded out the numbers and overflowed the
         panel. See ADR-0014 / ADR-0015. -->

    <button id="update-row" class="hidden update-row"></button>

    <!-- One quota card per agent, built by renderQuotas(). A card is only ever rendered for an agent
         that HAS a usable percentage — an agent with no basis gets no card at all, rather than an
         empty one reading "--%" that occupies the space while saying nothing. -->
    <div id="sub-block"></div>

    <div id="api-block" class="hidden">
      <div class="label-row"><span data-i18n="cost_today">今日成本</span><span id="cost-today" class="num big">$0.00</span></div>
      <div class="label-row"><span data-i18n="cost_7d">近 7 天成本</span><span id="cost-week" class="num">$0.00</span></div>
    </div>

    <div class="divider"></div>

    <div class="label-row"><span data-i18n="tok_today">今日 tokens</span><span id="tok-today" class="num">0</span></div>
    <div id="trend" data-i18n-title="trend_title"></div>

    <!-- Shown only while something genuinely needs doing; takes you to the Settings tab that needs it,
         and disappears for good once it's done. -->
    <div class="setup-line hidden" id="setup-line">
      <span id="setup-text"></span>
      <span class="setup-go">→</span>
    </div>

    <!-- Per-session breakdown, pinned to the very bottom so it never pushes the usage numbers around.
         The divider is inside the block, so both appear/disappear together (only when >1 session). -->
    <div id="sessions-block" class="hidden">
      <div class="divider"></div>
      <div class="label-row">
        <span data-i18n="sessions_label">会话</span>
        <span id="sessions-count" class="num small"></span>
      </div>
      <div id="session-list"></div>
    </div>

    <!-- Bottom row: Settings, About, and GitHub link. Quiet, last, easy to reach but not in your face. -->
    <div class="divider"></div>
    <div class="bottom-row">
      <span class="bottom-item" id="open-settings" role="button" tabindex="0">
        <svg class="bottom-ico" width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
          <circle cx="3.5" cy="3" r="1.6"/><path d="M5 3h7.5"/>
          <circle cx="6.5" cy="6.5" r="1.6"/><path d="M.5 6.5h5m2 0h5"/>
          <circle cx="4.5" cy="10" r="1.6"/><path d="M6 10h6.5"/>
        </svg>
        <span data-i18n="settings">设置</span>
      </span>
      <span class="bottom-item" id="open-about" role="button" tabindex="0">
        <svg class="bottom-ico" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.2"/>
          <rect x="5.6" y="5" width="1.8" height="5" rx="0.6" fill="currentColor"/>
          <circle cx="6.5" cy="3.5" r="0.9" fill="currentColor"/>
        </svg>
        <span data-i18n="about">关于</span>
      </span>
      <a class="bottom-item" id="open-github" href="https://github.com/ZGhey/tokibean" target="_blank" rel="noopener">
        <svg class="bottom-ico" width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2h3.5v3.5"/>
          <path d="M11.5 2l-5.5 6"/>
          <path d="M5.5 3.5H2.5a1 1 0 00-1 1v6a1 1 0 001 1h6a1 1 0 001-1V7"/>
        </svg>
        <span>GitHub</span>
      </a>
    </div>
  </div>

  <canvas id="pet" width="288" height="184" data-i18n-title="pet_title"></canvas>

  <script src="pet.js"></script>
  <script src="main.js"></script>
</body>
</html>
