<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Pet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="panel" class="hidden">
    <div class="row head">
      <span id="mode-badge" class="badge">订阅</span>
      <!-- Settings used to be reachable ONLY from the tray menu. That's a hole, not an
           inconvenience: a user who never thinks to click the tray icon can't configure anything. -->
      <button id="open-settings" class="gear" data-i18n-title="settings" aria-label="Settings">⚙</button>
      <select id="mode-select" data-i18n-title="billing_mode">
        <option value="auto" data-i18n="mode_auto">自动检测</option>
        <option value="subscription" data-i18n="mode_sub">订阅(Pro/Max)</option>
        <option value="api" data-i18n="mode_api">API 计费</option>
      </select>
    </div>

    <button id="update-row" class="hidden update-row"></button>

    <!-- One quota card per agent, built by renderQuotas(). A Claude 5-hour block and a Codex
         30-day window are different quantities: they sit side by side and are never compared. -->
    <div id="sub-block"></div>

    <div id="api-block" class="hidden">
      <div class="label-row"><span data-i18n="cost_today">今日成本</span><span id="cost-today" class="num big">$0.00</span></div>
      <div class="label-row"><span data-i18n="last7">近 7 天</span><span id="cost-week" class="num">$0.00</span></div>
    </div>

    <div id="trend" data-i18n-title="trend_title"></div>
    <div class="label-row"><span data-i18n="tok_today">今日 tokens</span><span id="tok-today" class="num">0</span></div>
    <div class="label-row"><span data-i18n="last7">近 7 天</span><span id="tok-week" class="num">0</span></div>
    <div class="label-row"><span data-i18n="models">模型</span></div>
    <div id="models" class="model-list"></div>

    <!-- Setup lives in Settings now (ADR-0014). The account row, connect button, hook row and install
         buttons were one-time things nobody looks at twice, permanently parked on the surface you open
         every day — and they're what overflowed it. What's left here is only ever an INVITATION: one
         line, shown only while something actually needs doing, that takes you where you can do it. -->
    <div class="setup-line hidden" id="setup-line">
      <span id="setup-text"></span>
      <span class="setup-go">→</span>
    </div>

    <!-- Per-session breakdown, pinned to the very bottom so it never pushes the usage numbers around.
         The divider is inside the block, so both appear/disappear together (only when >1 session). -->
    <div id="sessions-block" class="hidden">
      <div class="divider"></div>
      <div class="label-row">
        <span data-i18n="sessions_label">会话</span>
        <span id="sessions-count" class="num small"></span>
      </div>
      <div id="session-list"></div>
    </div>
  </div>

  <canvas id="pet" width="200" height="184" data-i18n-title="pet_title"></canvas>

  <script src="pet.js"></script>
  <script src="main.js"></script>
</body>
</html>
