# 双平台安装包构建
# 触发方式:
#   1. Actions 页面手动点 "Run workflow"(workflow_dispatch)
#   2. 推 v* 标签(如 v0.1.0)——会额外创建 GitHub Release 并挂上安装包
# 产物在 Actions 运行详情页的 Artifacts 里下载:
#   macOS: .dmg(Universal,Intel+Apple Silicon 通用)
#   Windows: NSIS .exe 安装器 + .msi

name: build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm install

      - name: Build bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing: with these present, tauri-action signs each bundle (.sig)
          # and generates + uploads latest.json to the Release
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 推标签时创建 Release 并上传安装包;手动触发时只构建
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && 'Tokibean 码豆 __VERSION__' || '' }}
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-pet-${{ matrix.platform }}
          path: |
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/nsis/*.exe
            src-tauri/target/**/bundle/msi/*.msi
          if-no-files-found: warn
