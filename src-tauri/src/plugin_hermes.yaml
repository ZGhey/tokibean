name: tokibean
version: "0.1.0"
description: "Tokibean desktop pet integration — forwards Hermes lifecycle events to the local pet"
hermes_version: ">=0.18.0"
provides_hooks:
  - pre_tool_call
  - post_tool_call
  - pre_llm_call
  - post_llm_call
  - on_session_start
  - on_session_end
  - subagent_stop
  - pre_approval_request
